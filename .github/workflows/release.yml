name: Release

# Changesets-driven release. On push to main, changesets/action opens (or updates) a "Version
# Packages" PR that aggregates the pending changesets; merging that PR runs the `release` script
# (changeset publish) to publish the bumped packages to npm. One-time setup: add an npm **automation**
# access token (bypasses 2FA) as the repo secret NPM_TOKEN.
on:
    push:
        branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
    contents: write
    pull-requests: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: npm
                  registry-url: 'https://registry.npmjs.org'

            - name: Install (npm ci — root + workspaces)
              run: npm ci

            - name: Quality gate
              run: |
                  npm run lint:ci
                  npm run types
                  npm run test:types
                  npm run test

            - name: Create Release PR or publish to npm
              uses: changesets/action@v1
              with:
                  version: npm run version
                  publish: npm run release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
