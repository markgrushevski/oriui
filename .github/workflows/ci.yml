name: CI

on:
    push:
        branches: [main]
    pull_request:

# One run per ref; cancel superseded runs to save minutes.
concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    quality:
        name: quality (node ${{ matrix.node }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            # Build toolchain floor is Node 22 (tsdown needs ^22.18 || >=24.11; Node 20 is EOL).
            matrix:
                node: ['22', '24']
        steps:
            - uses: actions/checkout@v5

            - uses: actions/setup-node@v5
              with:
                  node-version: ${{ matrix.node }}
                  cache: npm

            - name: Install (npm ci — root + workspaces)
              run: npm ci

            - name: Lint (prettier / stylelint / eslint, check mode)
              run: npm run lint:ci

            - name: Type-check (library + test suite)
              run: |
                  npm run types
                  npm run test:types

            - name: Test (vitest + axe + coverage)
              run: npm run test:cov

            - name: Upload coverage to Codecov
              if: matrix.node == '22'
              uses: codecov/codecov-action@v5
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: ./coverage/lcov.info
                  fail_ci_if_error: false

            - name: Build (headless packages -> lib -> .d.ts)
              run: npm run build

            - name: Size budget (size-limit — CSS + JS gzip, guards the zero-runtime promise)
              if: matrix.node == '22'
              run: npm run size

    e2e:
        name: e2e (Playwright — real Chromium)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5

            - uses: actions/setup-node@v5
              with:
                  node-version: '22'
                  cache: npm

            - name: Install (npm ci — root + workspaces)
              run: npm ci

            - name: Install Playwright Chromium
              run: npx playwright install --with-deps chromium

            - name: e2e (.ori-anchored placement + collision flip + Popover API)
              run: npm run test:e2e
