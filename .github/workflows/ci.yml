name: CI

on:
    push:
        branches: [main]
    pull_request:

# One run per ref; cancel superseded runs to save minutes.
concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    quality:
        name: quality (node ${{ matrix.node }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            # Build toolchain floor is Node 22 (tsdown needs ^22.18 || >=24.11; Node 20 is EOL).
            matrix:
                node: ['22', '24']
        steps:
            - uses: actions/checkout@v5

            - uses: actions/setup-node@v5
              with:
                  node-version: ${{ matrix.node }}
                  cache: npm

            - name: Install (npm ci — root + workspaces)
              run: npm ci

            - name: Lint (prettier / stylelint / eslint, check mode)
              run: npm run lint:ci

            - name: Type-check (library + test suite)
              run: |
                  npm run types
                  npm run test:types

            - name: Test (vitest + axe + coverage)
              run: npm run test:cov

            - name: Upload coverage to Codecov
              if: matrix.node == '22'
              uses: codecov/codecov-action@v5
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: ./coverage/lcov.info
                  fail_ci_if_error: false

            - name: Build (headless packages -> lib -> .d.ts)
              run: npm run build

            - name: Size budget (size-limit — CSS + JS gzip, guards the zero-runtime promise)
              if: matrix.node == '22'
              run: npm run size

            - name: Publish-correctness (publint — package.json exports / files / types map)
              if: matrix.node == '22'
              run: npx -y publint@0.3.21 ./packages/css && npx -y publint@0.3.21 ./packages/headless && npx -y publint@0.3.21 ./packages/vue

            # Type-portability: the emitted .d.ts must resolve under node16/nodenext + bundler (the profiles
            # the packages actually target — they are ESM-only, "type":"module", Node >=22). node10 (classic
            # resolution) is intentionally out of scope: it ignores `exports`, so the subpath entries
            # (@oriui/headless/{vue,svelte}) can't resolve without `typesVersions` hacks we don't ship —
            # hence --profile node16. cjs-resolves-to-esm is expected + ignored (there is no CJS build).
            # @oriui/css ships no types, so attw doesn't apply (publint covers its exports above).
            - name: Type-portability (arethetypeswrong — node16 .d.ts interop)
              if: matrix.node == '22'
              run: |
                  npx -y @arethetypeswrong/cli@0.18.5 --pack ./packages/headless --profile node16 --ignore-rules cjs-resolves-to-esm
                  npx -y @arethetypeswrong/cli@0.18.5 --pack ./packages/vue --profile node16 --ignore-rules cjs-resolves-to-esm

            - name: Docs build (gate the Nuxt docs site — catch broken content / component usage)
              if: matrix.node == '22'
              run: npm run docs:build

    e2e:
        name: e2e (Playwright — real Chromium)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5

            - uses: actions/setup-node@v5
              with:
                  node-version: '22'
                  cache: npm

            - name: Install (npm ci — root + workspaces)
              run: npm ci

            - name: Install Playwright Chromium
              run: npx playwright install --with-deps chromium

            - name: e2e (.ori-anchored placement + collision flip + Popover API)
              run: npm run test:e2e
